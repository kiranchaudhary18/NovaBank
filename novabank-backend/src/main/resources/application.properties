# ===================================================================
# NovaBank Backend Application Properties
# Phase 1: Project Foundation Configuration
# ===================================================================

# Application Information
spring.application.name=novabank-backend

# -------------------------------------------------------------------
# Database Configuration (PostgreSQL / Neon)
# -------------------------------------------------------------------
# Uses environment variables or falls back to localhost defaults for development
spring.datasource.url=jdbc:postgresql://ep-raspy-mountain-augivirp-pooler.c-10.us-east-1.aws.neon.tech/neondb?sslmode=require&channelBinding=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_fZwDJamo43Pj
spring.datasource.properties.prepareThreshold=0
spring.datasource.driver-class-name=org.postgresql.Driver

# -------------------------------------------------------------------
# JPA / Hibernate Configurations
# -------------------------------------------------------------------
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# "update" is suitable for initial phases; in production we would use Flyway/Liquibase migrations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# -------------------------------------------------------------------
# Server Settings
# -------------------------------------------------------------------
server.port=${PORT:8080}
server.servlet.context-path=/api/v1

# -------------------------------------------------------------------
# Logging Settings
# -------------------------------------------------------------------
logging.level.org.springframework=INFO
logging.level.com.novabank.backend=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# -------------------------------------------------------------------
# JWT (JSON Web Token) Security Settings
# -------------------------------------------------------------------
# HS256 signing key (256-bit minimum key size)
novabank.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
# Default token validity duration (e.g., 24 hours in milliseconds = 86400000)
novabank.jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# -------------------------------------------------------------------
# JavaMail Sender Settings (Phase 10)
# -------------------------------------------------------------------
spring.mail.host=smtp.novabank.com
spring.mail.port=587
spring.mail.username=notifications@novabank.com
spring.mail.password=mockPassword
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# -------------------------------------------------------------------
# Enterprise Scheduler & Background Jobs (Phase 14)
# -------------------------------------------------------------------
# Enable/disable individual schedulers
novabank.scheduler.interest.enabled=true
novabank.scheduler.cards.enabled=true
novabank.scheduler.statement.enabled=true
novabank.scheduler.inactive.enabled=true
novabank.scheduler.notifications.retry.enabled=true
novabank.scheduler.reports.enabled=true
novabank.scheduler.monthly.reports.enabled=true
novabank.scheduler.cleanup.enabled=true
novabank.scheduler.loans.reminder.enabled=true
novabank.scheduler.loans.overdue.enabled=true

# Cron Expressions configurations
novabank.scheduler.interest.cron=0 0 1 * * ?
novabank.scheduler.statement.cron=0 0 2 1 * ?
novabank.scheduler.reports.cron=0 0 23 * * ?
novabank.scheduler.cleanup.cron=0 0 3 * * ?
novabank.scheduler.cards.cron=0 0 4 * * ?
novabank.scheduler.inactive.cron=0 0 5 * * ?
novabank.scheduler.notifications.retry.cron=0 */15 * * * ?
novabank.scheduler.monthly.reports.cron=0 0 23 1 * ?
novabank.scheduler.loans.reminder.cron=0 0 8 * * ?
novabank.scheduler.loans.overdue.cron=0 0 9 * * ?



